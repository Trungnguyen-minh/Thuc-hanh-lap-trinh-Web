<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thanh toán đơn hàng - ShopVN">
    <title>Thanh toán - ShopVN</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="navbar-container" data-active=""></div>

    <section class="section-sm container">
        <div class="breadcrumb" style="margin-bottom:24px">
            <a href="/">Trang chủ</a><span class="breadcrumb-sep">/</span>
            <a href="/cart.html">Giỏ hàng</a><span class="breadcrumb-sep">/</span>
            <span>Thanh toán</span>
        </div>
        <h1 style="font-size:2rem;font-weight:800;margin-bottom:32px">📋 Xác nhận đơn hàng</h1>

        <div id="checkout-content">
            <div class="loading-state">
                <div class="spinner"></div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        async function loadCheckout() {
            if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
            const container = document.getElementById('checkout-content');

            try {
                const res = await CartAPI.get();
                const cart = res.data;
                if (!cart.items || cart.items.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Giỏ hàng trống</div><a href="/products.html" class="btn btn-primary" style="margin-top:16px">Mua sắm ngay</a></div>`;
                    return;
                }
                container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 400px;gap:32px;align-items:start" class="animate-fade" id="checkout-layout">
          <div>
            <div class="card" style="padding:28px;margin-bottom:24px">
              <h3 style="font-weight:700;margin-bottom:20px">📍 Thông tin giao hàng</h3>
              <form id="checkout-form" style="display:flex;flex-direction:column;gap:16px">
                <div class="form-group">
                  <label class="form-label">Số điện thoại *</label>
                  <input type="tel" id="phone" class="form-input" placeholder="VD: 0901234567" required
                    pattern="^(0[3|5|7|8|9])[0-9]{8}$">
                  <span class="form-hint">Số điện thoại Việt Nam (10 số)</span>
                </div>
                <div class="form-group">
                  <label class="form-label">Địa chỉ giao hàng *</label>
                  <textarea id="address" class="form-input" rows="3" placeholder="Nhập địa chỉ chi tiết..." 
                    required minlength="10" maxlength="300" style="resize:vertical"></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">Ghi chú (tùy chọn)</label>
                  <textarea id="note" class="form-input" rows="2" placeholder="Ghi chú cho đơn hàng..." 
                    style="resize:vertical"></textarea>
                </div>
                <div id="checkout-error" style="display:none" class="alert alert-error"></div>
              </form>
            </div>

            <div class="card" style="padding:28px;margin-bottom:24px">
              <h3 style="font-weight:700;margin-bottom:16px">💳 Phương thức thanh toán</h3>
              <div style="display:flex;flex-direction:column;gap:12px">
                <!-- VNPAY -->
                <div id="vnpay-container" style="border:1px solid var(--accent); border-radius:8px; padding:16px; background:rgba(108,99,255,0.05); display:flex; align-items:center; gap:12px;">
                  <input type="radio" id="payment-vnpay" name="payment_method" value="vnpay" checked style="accent-color: var(--accent); transform: scale(1.2);" onchange="updatePaymentText()">
                  <label for="payment-vnpay" style="display:flex; align-items:center; gap:12px; width:100%; cursor:pointer;">
                    <div style="width:40px; height:40px; background:white; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:900; color:#005a9e; font-size:0.7rem; border:1px solid #e5e7eb;">
                      VNPAY
                    </div>
                    <div>
                      <div style="font-weight:600;">Thanh toán qua VNPAY</div>
                      <div style="font-size:0.8rem; color:var(--text-muted);">Thẻ ATM, Visa, MasterCard, JCB, QR Code</div>
                    </div>
                  </label>
                </div>
                <!-- COD -->
                <div id="cod-container" style="border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; align-items:center; gap:12px;">
                  <input type="radio" id="payment-cod" name="payment_method" value="cod" style="accent-color: var(--accent); transform: scale(1.2);" onchange="updatePaymentText()">
                  <label for="payment-cod" style="display:flex; align-items:center; gap:12px; width:100%; cursor:pointer;">
                    <div style="width:40px; height:40px; background:white; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:900; color:#10b981; font-size:0.7rem; border:1px solid #e5e7eb;">
                      COD
                    </div>
                    <div>
                      <div style="font-weight:600;">Thanh toán khi nhận hàng (COD)</div>
                      <div style="font-size:0.8rem; color:var(--text-muted);">Thanh toán bằng tiền mặt khi shipper giao hàng</div>
                    </div>
                  </label>
                </div>
              </div>
            </div>

            <div class="card" style="padding:28px">
              <h3 style="font-weight:700;margin-bottom:16px">📦 Sản phẩm (${cart.totalItems})</h3>
              <div style="display:flex;flex-direction:column;gap:12px">
                ${cart.items.map(item => `
                  <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-glass);border-radius:var(--radius-sm)">
                    <div style="width:50px;height:50px;border-radius:8px;background:#1a1d2a;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">
                      ${item.imageUrl ? `<img src="${item.imageUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">` : '📦'}
                    </div>
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:600;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.productName}</div>
                      <div style="font-size:.8rem;color:var(--text-muted)">${formatPrice(item.unitPrice)} × ${item.quantity}</div>
                    </div>
                    <div style="font-weight:700;color:var(--accent);flex-shrink:0">${formatPrice(item.subTotal)}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="summary-box">
            <h3 style="font-weight:700;margin-bottom:16px">Tóm tắt</h3>
            <div class="summary-row"><span style="color:var(--text-muted)">Tạm tính</span><span>${formatPrice(cart.totalAmount)}</span></div>
            <div class="summary-row"><span style="color:var(--text-muted)">Phí vận chuyển</span><span style="color:var(--success)">Miễn phí</span></div>
            <div class="summary-row" style="border-top:2px solid var(--border);padding-top:16px;margin-top:8px">
              <span style="font-weight:700;font-size:1.05rem">Tổng cộng</span>
              <span class="summary-total">${formatPrice(cart.totalAmount)}</span>
            </div>
            <button class="btn btn-primary btn-full btn-lg" style="margin-top:20px" onclick="placeOrder()" id="btn-order">
              Đặt hàng ngay
            </button>
            <p style="text-align:center;margin-top:12px;font-size:.8rem;color:var(--text-muted)" id="payment-subtext">
              Bạn sẽ được chuyển đến trang thanh toán VNPay
            </p>
          </div>
        </div>`;
            } catch (e) {
                container.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
            }
        }

        function updatePaymentText() {
            const isVnpay = document.getElementById('payment-vnpay').checked;
            const vnpayContainer = document.getElementById('vnpay-container');
            const codContainer = document.getElementById('cod-container');
            const subtext = document.getElementById('payment-subtext');
            const btnOrder = document.getElementById('btn-order');

            if (isVnpay) {
                vnpayContainer.style.border = '1px solid var(--accent)';
                vnpayContainer.style.background = 'rgba(108,99,255,0.05)';
                codContainer.style.border = '1px solid var(--border)';
                codContainer.style.background = 'none';
                subtext.textContent = 'Bạn sẽ được chuyển đến trang thanh toán VNPay';
                btnOrder.textContent = 'Đặt hàng ngay';
            } else {
                vnpayContainer.style.border = '1px solid var(--border)';
                vnpayContainer.style.background = 'none';
                codContainer.style.border = '1px solid var(--accent)';
                codContainer.style.background = 'rgba(108,99,255,0.05)';
                subtext.textContent = 'Đơn hàng sẽ được thanh toán bằng tiền mặt khi giao hàng (COD)';
                btnOrder.textContent = 'Đặt hàng ngay (COD)';
            }
        }

        async function placeOrder() {
            const phone = document.getElementById('phone');
            const address = document.getElementById('address');
            const note = document.getElementById('note');
            const errEl = document.getElementById('checkout-error');
            const btn = document.getElementById('btn-order');
            const isVnpay = document.getElementById('payment-vnpay').checked;

            // Validate
            if (!phone.value.match(/^(0[35789])[0-9]{8}$/)) {
                errEl.textContent = 'Số điện thoại không hợp lệ'; errEl.style.display = 'flex';
                phone.focus(); return;
            }
            if (address.value.trim().length < 10) {
                errEl.textContent = 'Địa chỉ phải có ít nhất 10 ký tự'; errEl.style.display = 'flex';
                address.focus(); return;
            }
            errEl.style.display = 'none';
            btn.disabled = true; btn.textContent = 'Đang xử lý...';

            try {
                const orderRes = await OrderAPI.reserve({
                    shippingAddress: address.value.trim(),
                    phoneNumber: phone.value.trim(),
                    note: note.value.trim() || null
                });
                const orderId = orderRes.data.orderId;

                if (isVnpay) {
                    // Create VNPay payment
                    try {
                        const payRes = await OrderAPI.createPayment(orderId);
                        if (payRes.data?.paymentUrl) {
                            window.location.href = `/vnpay-mock.html?orderId=${orderId}&txnRef=${payRes.data.paymentUrl}&amount=${orderRes.data.totalAmount}`;
                            return;
                        }
                    } catch {
                        // If VNPay fails, still show confirmation
                    }
                }
                
                // For COD (or failed VNPAY), go straight to confirmation page
                window.location.href = `/order-confirmation.html?orderId=${orderId}`;
            } catch (e) {
                errEl.textContent = e.message; errEl.style.display = 'flex';
                btn.disabled = false; btn.textContent = isVnpay ? 'Đặt hàng ngay' : 'Đặt hàng ngay (COD)';
            }
        }

        loadCheckout();
    </script>
    <style>
        @media (max-width: 768px) {
            #checkout-layout {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</body>

</html>
