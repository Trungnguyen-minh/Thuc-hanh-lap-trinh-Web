<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Giỏ hàng của bạn - ShopVN">
  <title>Giỏ hàng - ShopVN</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div id="navbar-container" data-active=""></div>

  <section class="section-sm container">
    <div class="breadcrumb" style="margin-bottom:24px">
      <a href="/">Trang chủ</a><span class="breadcrumb-sep">/</span><span>Giỏ hàng</span>
    </div>
    <h1 style="font-size:2rem;font-weight:800;margin-bottom:32px">🛒 Giỏ hàng của bạn</h1>

    <div id="cart-content">
      <div class="loading-state">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script>
    async function loadCart() {
      if (!Auth.isLoggedIn()) {
        document.getElementById('cart-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔒</div>
            <div class="empty-title">Bạn chưa đăng nhập</div>
            <div class="empty-sub">Đăng nhập để xem giỏ hàng của bạn</div>
            <a href="/login.html" class="btn btn-primary" style="margin-top:16px">Đăng nhập</a>
          </div>`;
        return;
      }
      const container = document.getElementById('cart-content');
      try {
        const res = await CartAPI.get();
        const cart = res.data;
        setCartCount(cart.totalItems || 0);
        if (!cart.items || cart.items.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🛒</div>
              <div class="empty-title">Giỏ hàng trống</div>
              <div class="empty-sub">Hãy thêm sản phẩm vào giỏ hàng!</div>
              <a href="/products.html" class="btn btn-primary" style="margin-top:16px">Mua sắm ngay →</a>
            </div>`;
          return;
        }
        container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start" class="animate-fade" id="cart-layout">
          <div style="display:flex;flex-direction:column;gap:16px" id="cart-items">
            ${cart.items.map(item => renderCartItem(item)).join('')}
            <div style="text-align:right;margin-top:8px">
              <button class="btn btn-outline btn-sm" onclick="clearCart()" style="color:var(--danger);border-color:rgba(239,68,68,.3)">
                🗑️ Xóa toàn bộ
              </button>
            </div>
          </div>
          <div class="summary-box">
            <h3 style="font-weight:700;margin-bottom:16px">Tóm tắt đơn hàng</h3>
            <div class="summary-row">
              <span style="color:var(--text-muted)">Số lượng</span>
              <span>${cart.totalItems} sản phẩm</span>
            </div>
            <div class="summary-row">
              <span style="color:var(--text-muted)">Tạm tính</span>
              <span>${formatPrice(cart.totalAmount)}</span>
            </div>
            <div class="summary-row">
              <span style="color:var(--text-muted)">Phí vận chuyển</span>
              <span style="color:var(--success)">Miễn phí</span>
            </div>
            <div class="summary-row" style="border-top:2px solid var(--border);padding-top:16px;margin-top:8px">
              <span style="font-weight:700;font-size:1.05rem">Tổng cộng</span>
              <span class="summary-total">${formatPrice(cart.totalAmount)}</span>
            </div>
            <a href="/checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:20px">
              Tiến hành đặt hàng →
            </a>
            <a href="/products.html" style="display:block;text-align:center;margin-top:12px;font-size:.875rem;color:var(--text-muted)">
              ← Tiếp tục mua sắm
            </a>
          </div>
        </div>`;
      } catch (e) {
        container.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    function renderCartItem(item) {
      const img = item.imageUrl
        ? `<img src="${item.imageUrl}" alt="${item.productName}" class="cart-item-img">`
        : `<div class="cart-item-img-placeholder">📦</div>`;
      return `
      <div class="cart-item" id="cart-item-${item.cartItemId}">
        ${img}
        <div>
          <div class="cart-item-name">${item.productName}</div>
          <div class="cart-item-price">${formatPrice(item.unitPrice)} / sản phẩm</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty(${item.cartItemId}, ${item.quantity - 1})">−</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" onclick="updateQty(${item.cartItemId}, ${item.quantity + 1})">+</button>
          </div>
        </div>
        <div style="text-align:right">
          <div class="cart-item-subtotal">${formatPrice(item.subTotal)}</div>
          <button class="cart-remove" onclick="removeItem(${item.cartItemId})" title="Xóa">✕</button>
        </div>
      </div>`;
    }

    async function updateQty(cartItemId, newQty) {
      if (newQty < 1) { removeItem(cartItemId); return; }
      try {
        await CartAPI.updateItem(cartItemId, newQty);
        loadCart();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function removeItem(cartItemId) {
      try {
        await CartAPI.removeItem(cartItemId);
        showToast('Đã xóa sản phẩm');
        loadCart();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function clearCart() {
      if (!confirm('Bạn có chắc muốn xóa toàn bộ giỏ hàng?')) return;
      try {
        await CartAPI.clear();
        showToast('Đã xóa toàn bộ giỏ hàng');
        loadCart();
      } catch (e) { showToast(e.message, 'error'); }
    }

    loadCart();
  </script>
  <style>
    @media (max-width: 768px) {
      #cart-layout {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</body>

</html>
