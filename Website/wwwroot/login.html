<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - ShopVN</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card animate-fade">
      <div style="text-align:center;margin-bottom:8px">
        <a href="/" class="navbar-brand" style="font-size:1.75rem;display:inline-block">✦ ShopVN</a>
      </div>
      <h1 class="auth-title" style="text-align:center">Đăng nhập</h1>
      <p class="auth-sub" style="text-align:center">Chào mừng bạn trở lại!</p>

      <form id="login-form" style="display:flex;flex-direction:column;gap:16px">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
        </div>
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">Đăng nhập</button>
      </form>

      <div class="auth-divider">hoặc</div>
      <p style="text-align:center;font-size:.9rem;color:var(--text-muted)">
        Chưa có tài khoản? <a href="/register.html" class="auth-link">Đăng ký ngay</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Đang đăng nhập...';

      try {
        await AuthAPI.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
        window.location.href = redirect;
      } catch (e) {
        errEl.textContent = e.message || 'Email hoặc mật khẩu không đúng';
        errEl.style.display = 'flex';
        btn.disabled = false; btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>

</html>
